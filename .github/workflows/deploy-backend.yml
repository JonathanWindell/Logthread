# .github/workflows/deploy-backend.yml
name: Deploy Backend to AWS (v3)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # ÄNDRING: env-blocket ligger nu här, på jobb-nivå
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
      COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      USER_POOL_ID: ${{ secrets.USER_POOL_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Serverless Framework v3 and dependencies
        run: |
          npm install -g serverless@3
          npm install --save-dev server-python-requirements

      - name: Serverless Deploy
        # Notera: env-blocket är borttaget härifrån
        run: serverless deploy